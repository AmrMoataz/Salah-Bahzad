<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; width:100%; aspect-ratio:16/9; container-type:inline-size; overflow:hidden; background:#1E5B36; font-family:'Nunito Sans',-apple-system,sans-serif;">
  <div style="position:absolute; inset:0; display:grid; grid-template-columns:60% 40%; grid-template-rows:54% 46%;">
    <div style="background:#1E5B36;"></div>
    <div style="background:#34B5A0;"></div>
    <div style="background:#E1554C;"></div>
    <div style="background:#E0BE3C;"></div>
  </div>
  <img src="assets/crown.png" alt="" style="position:absolute; top:8%; right:5cqw; width:13cqw; filter:brightness(0) invert(1); opacity:.96;">
  <div style="position:absolute; left:6cqw; top:11%; right:30%;">
    <div style="font-weight:800; font-size:13cqw; line-height:.82; color:#F4F1E4; letter-spacing:-.3cqw; white-space:nowrap;">Session {{ num }}</div>
  </div>
  <div style="position:absolute; left:6cqw; bottom:12%; right:40%;">
    <div style="font-weight:700; font-size:7.4cqw; line-height:1.02; color:#F4F1E4;">{{ title }} <span style="white-space:nowrap; opacity:.95;">[{{ grade }}]</span></div>
  </div>
  <img src="{{ mascot }}" alt="" style="position:absolute; right:1.5cqw; bottom:0; height:51cqw; max-height:96%; object-fit:contain; object-position:bottom; filter:drop-shadow(0 0.4cqw 0.6cqw rgba(0,0,0,.18));">
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:203},&quot;num&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Calculus&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;grade&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;3rd Sec&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;mascot&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;assets/salah-passed.png&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
